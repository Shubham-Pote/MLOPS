name: MLOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # ── Python Setup ──────────────────────────────────────────────────────────
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # ── Install Backend Dependencies ──────────────────────────────────────────
    - name: Install Backend Dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest httpx

    # ── Validate Imports ──────────────────────────────────────────────────────
    - name: Validate Python Imports
      run: |
        python -c "import fastapi, sklearn, mlflow, joblib; print('All imports OK')"

    # ── Build Docker Image ────────────────────────────────────────────────────
    - name: Build Docker Image
      run: |
        docker build -t mlops-runner ./docker

    # ── Test Docker Execution ─────────────────────────────────────────────────
    - name: Test Docker Execution
      run: |
        echo "print('CI Docker test passed')" > /tmp/test_ci.py
        docker run --rm -v /tmp:/app mlops-runner python /app/test_ci.py

    # ── Run API Tests ─────────────────────────────────────────────────────────
    - name: Run API Tests
      run: |
        cd backend
        pytest test_api.py -v
