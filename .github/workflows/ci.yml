name: MLOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # ── Python Setup ──────────────────────────────────────────────────────────
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # ── Cache pip (makes CI faster on repeat runs) ────────────────────────────
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # ── Install Backend Dependencies ──────────────────────────────────────────
    - name: Install Backend Dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest httpx flake8

    # ── Lint Code (code quality check) ────────────────────────────────────────
    - name: Lint with flake8
      run: |
        flake8 backend --max-line-length=120 --exclude=backend/__pycache__,backend/test_api.py

    # ── Validate Imports ──────────────────────────────────────────────────────
    - name: Validate Python Imports
      run: |
        python -c "import fastapi, sklearn, mlflow, joblib; print('All imports OK')"

    # ── Build Docker Image ────────────────────────────────────────────────────
    - name: Build Docker Image
      run: |
        docker build -t mlops-runner ./docker

    # ── Test Docker ML Execution (validates sklearn works in container) ────────
    - name: Test Docker ML Execution
      run: |
        printf "from sklearn.datasets import load_iris\nX, y = load_iris(return_X_y=True)\nprint('ML OK - samples:', len(X))" > /tmp/test_ml.py
        docker run --rm -v /tmp:/app mlops-runner python /app/test_ml.py

    # ── Run API Tests ─────────────────────────────────────────────────────────
    - name: Run API Tests
      run: |
        cd backend
        pytest test_api.py -v
